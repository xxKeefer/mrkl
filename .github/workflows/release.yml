name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'New version (e.g., 1.2.3)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push commits and create releases

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Important for changelogen to see history

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version & Generate Changelog
        run: |
          pnpm version ${{ github.event.inputs.version }} --no-git-tag-version
          pnpm exec changelogen --write

      - name: Commit & Tag
        run: |
          git add .
          git commit -m "chore: release v${{ github.event.inputs.version }}"
          git tag "v${{ github.event.inputs.version }}"
          git push origin main --tags

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract the latest entry from CHANGELOG.md
          sed -n '/^## / { :a; n; /^## / q; p; ba }' CHANGELOG.md > latest_notes.txt
          gh release create "v${{ github.event.inputs.version }}" --notes-file latest_notes.txt
