name: Release & Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version bump (e.g., patch, minor, major, or explicit like 1.2.3)"
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: v${{ github.event.inputs.version }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run Tests
        run: pnpm vitest run

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm exec unbuild

      - name: Bump Version
        run: pnpm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Generate Changelog
        run: pnpm exec changelogen --output

      - name: Commit & Tag
        run: |
          git add .
          git commit -m "chore: release v${{ github.event.inputs.version }}"
          git tag "v${{ github.event.inputs.version }}"
          git push origin main --tags

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sed -n '/^## / { :a; n; /^## / q; p; ba }' CHANGELOG.md > latest_notes.txt
          gh release create "v${{ github.event.inputs.version }}" --notes-file latest_notes.txt

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Tag
        uses: actions/checkout@v4
        with:
          ref: v${{ github.event.inputs.version }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm exec unbuild

      - name: Publish to npm
        run: pnpm publish --provenance --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
